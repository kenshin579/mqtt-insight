name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # frontend/dist는 gitignore됨 — go:embed가 요구하므로 Go 테스트 전에 먼저 빌드한다
      - name: Frontend build, tests & typecheck
        working-directory: frontend
        run: |
          npm ci
          npm run build
          npx vitest run
          npx tsc --noEmit
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Go vet & test
        run: |
          go vet ./...
          go test ./...
